name: Java Services PR Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: java-services-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  order-web:
    name: order-web
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/order-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/order-web

      - name: Lint order-web
        run: npm run lint
        working-directory: apps/order-web

  order-api:
    name: order-api
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble order-api
        run: ./gradlew :apps:order-api:assemble

      - name: Spotless check order-api
        run: ./gradlew :apps:order-api:spotlessCheck

  orderbook-worker:
    name: orderbook-worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble orderbook-worker
        run: ./gradlew :apps:orderbook-worker:assemble

      - name: Spotless check orderbook-worker
        run: ./gradlew :apps:orderbook-worker:spotlessCheck

  query-api:
    name: query-api
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble query-api
        run: ./gradlew :apps:query-api:assemble

      - name: Spotless check query-api
        run: ./gradlew :apps:query-api:spotlessCheck

  pr-checks:
    name: pr-checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - order-web
      - order-api
      - orderbook-worker
      - query-api

    steps:
      - name: Fail if any service check failed
        run: |
          if [ "${{ needs.order-web.result }}" != "success" ] || \
             [ "${{ needs.order-api.result }}" != "success" ] || \
             [ "${{ needs.orderbook-worker.result }}" != "success" ] || \
             [ "${{ needs.query-api.result }}" != "success" ]; then
            echo "One or more PR checks failed."
            exit 1
          fi

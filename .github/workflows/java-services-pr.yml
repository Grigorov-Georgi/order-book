name: Java Services PR Checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: java-services-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  service-checks:
    name: ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: order-api
            project: :apps:order-api
          - name: orderbook-worker
            project: :apps:orderbook-worker
          - name: query-api
            project: :apps:query-api

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble ${{ matrix.service.name }}
        run: ./gradlew ${{ matrix.service.project }}:assemble

      - name: Spotless check ${{ matrix.service.name }}
        run: ./gradlew ${{ matrix.service.project }}:spotlessCheck

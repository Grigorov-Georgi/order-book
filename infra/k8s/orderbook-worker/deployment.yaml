apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderbook-worker
  namespace: order-book
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orderbook-worker
  template:
    metadata:
      labels:
        app: orderbook-worker
    spec:
      containers:
        - name: orderbook-worker
          image: order-book/orderbook-worker:latest

syntax = "proto3";

package io.orderable.contracts.proto;

option java_multiple_files = true;
option java_package = "io.orderable.contracts.proto";
option java_outer_classname = "OrderProto";

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_BUY = 1;
  ORDER_TYPE_SELL = 2;
}

message OrderCommand {
  string symbol = 1;
  string price = 2;
  OrderType type = 3;
  string quantity = 4;
}
